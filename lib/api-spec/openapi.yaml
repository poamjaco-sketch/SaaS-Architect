openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: SchoolCore - Multi-tenant school management platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: super-admin
    description: Super admin platform management
  - name: schools
    description: School management
  - name: students
    description: Student management
  - name: teachers
    description: Teacher management
  - name: classes
    description: Class management
  - name: subjects
    description: Subject management
  - name: attendance
    description: Attendance tracking
  - name: results
    description: Academic results
  - name: fees
    description: Fee management
  - name: announcements
    description: School announcements
  - name: parent
    description: Parent portal

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── AUTH ────────────────────────────────────────────────────────────────────
  /auth/login:
    post:
      operationId: requestOtp
      tags: [auth]
      summary: Request OTP to phone number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OtpRequest"
      responses:
        "200":
          description: OTP sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OtpResponse"

  /auth/verify:
    post:
      operationId: verifyOtp
      tags: [auth]
      summary: Verify OTP and get session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OtpVerify"
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user profile
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current session
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required: [success]

  # ─── SUPER ADMIN ─────────────────────────────────────────────────────────────
  /admin/dashboard:
    get:
      operationId: getSuperAdminDashboard
      tags: [super-admin]
      summary: Platform-wide dashboard stats
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuperAdminDashboard"

  /admin/schools:
    get:
      operationId: listAllSchools
      tags: [super-admin]
      summary: List all schools on the platform
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive, pending]
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of schools
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/School"
    post:
      operationId: createSchool
      tags: [super-admin]
      summary: Register a new school
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SchoolInput"
      responses:
        "201":
          description: School created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/School"

  /admin/schools/{schoolId}:
    get:
      operationId: getSchoolById
      tags: [super-admin]
      summary: Get school details
      parameters:
        - name: schoolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: School detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchoolDetail"
    patch:
      operationId: updateSchool
      tags: [super-admin]
      summary: Update school
      parameters:
        - name: schoolId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SchoolUpdate"
      responses:
        "200":
          description: Updated school
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/School"

  /admin/schools/{schoolId}/status:
    patch:
      operationId: updateSchoolStatus
      tags: [super-admin]
      summary: Toggle school active/inactive
      parameters:
        - name: schoolId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SchoolStatusUpdate"
      responses:
        "200":
          description: Updated school
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/School"

  /admin/analytics:
    get:
      operationId: getPlatformAnalytics
      tags: [super-admin]
      summary: Platform-wide analytics
      responses:
        "200":
          description: Analytics data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformAnalytics"

  # ─── SCHOOL DASHBOARD ────────────────────────────────────────────────────────
  /schools/{schoolId}/dashboard:
    get:
      operationId: getSchoolDashboard
      tags: [schools]
      summary: School admin dashboard summary
      parameters:
        - name: schoolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: School dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchoolDashboard"

  # ─── STUDENTS ────────────────────────────────────────────────────────────────
  /schools/{schoolId}/students:
    get:
      operationId: listStudents
      tags: [students]
      summary: List students in a school
      parameters:
        - name: schoolId
          in: path
          required: true
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
        - name: classId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive]
      responses:
        "200":
          description: List of students
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Student"
    post:
      operationId: createStudent
      tags: [students]
      summary: Add a new student
      parameters:
        - name: schoolId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudentInput"
      responses:
        "201":
          description: Student created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"

  /schools/{schoolId}/students/{studentId}:
    get:
      operationId: getStudent
      tags: [students]
      summary: Get student details
      parameters:
        - name: schoolId
          in: path
          required: true
          schema:
            type: integer
        - name: studentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Student detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentDetail"
    patch:
      operationId: updateStudent
      tags: [students]
      summary: Update student info
      parameters:
        - name: schoolId
          in: path
          required: true
          schema:
            type: integer
        - name: studentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudentUpdate"
      responses:
        "200":
          description: Updated student
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
    delete:
      operationId: deleteStudent
      tags: [students]
      summary: Remove a student
      parameters:
        - name: schoolId
          in: path
          required: true
          schema:
            type: integer
        - name: studentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required: [success]

  # ─── TEACHERS ────────────────────────────────────────────────────────────────
  /schools/{schoolId}/teachers:
    get:
      operationId: listTeachers
      tags: [teachers]
      summary: List teachers in a school
      parameters:
        - name: schoolId
          in: path
          required: true
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of teachers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Teacher"
    post:
      operationId: createTeacher
      tags: [teachers]
      summary: Add a teacher
      parameters:
        - name: schoolId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeacherInput"
      responses:
        "201":
          description: Teacher created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Teacher"

  /schools/{schoolId}/teachers/{teacherId}:
    get:
      operationId: getTeacher
      tags: [teachers]
      summary: Get teacher details
      parameters:
        - name: schoolId
          in: path
          required: true
          schema:
            type: integer
        - name: teacherId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Teacher detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Teacher"
    patch:
      operationId: updateTeacher
      tags: [teachers]
      summary: Update teacher
      parameters:
        - name: schoolId
          in: path
          required: true
          schema:
            type: integer
        - name: teacherId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeacherUpdate"
      responses:
        "200":
          description: Updated teacher
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Teacher"

  # ─── CLASSES ─────────────────────────────────────────────────────────────────
  /schools/{schoolId}/classes:
    get:
      operationId: listClasses
      tags: [classes]
      summary: List classes in a school
      parameters:
        - name: schoolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of classes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Class"
    post:
      operationId: createClass
      tags: [classes]
      summary: Create a class
      parameters:
        - name: schoolId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClassInput"
      responses:
        "201":
          description: Class created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Class"

  /schools/{schoolId}/classes/{classId}:
    patch:
      operationId: updateClass
      tags: [classes]
      summary: Update a class
      parameters:
        - name: schoolId
          in: path
          required: true
          schema:
            type: integer
        - name: classId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClassUpdate"
      responses:
        "200":
          description: Updated class
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Class"

  # ─── SUBJECTS ────────────────────────────────────────────────────────────────
  /schools/{schoolId}/subjects:
    get:
      operationId: listSubjects
      tags: [subjects]
      summary: List subjects in a school
      parameters:
        - name: schoolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of subjects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Subject"
    post:
      operationId: createSubject
      tags: [subjects]
      summary: Create a subject
      parameters:
        - name: schoolId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubjectInput"
      responses:
        "201":
          description: Subject created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subject"

  # ─── ATTENDANCE ───────────────────────────────────────────────────────────────
  /schools/{schoolId}/attendance:
    get:
      operationId: listAttendance
      tags: [attendance]
      summary: List attendance records
      parameters:
        - name: schoolId
          in: path
          required: true
          schema:
            type: integer
        - name: classId
          in: query
          schema:
            type: integer
        - name: date
          in: query
          schema:
            type: string
            format: date
        - name: studentId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Attendance records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttendanceRecord"
    post:
      operationId: submitAttendance
      tags: [attendance]
      summary: Submit attendance for a class
      parameters:
        - name: schoolId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttendanceInput"
      responses:
        "201":
          description: Attendance submitted
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttendanceRecord"

  /schools/{schoolId}/attendance/summary:
    get:
      operationId: getAttendanceSummary
      tags: [attendance]
      summary: Attendance summary per class/student
      parameters:
        - name: schoolId
          in: path
          required: true
          schema:
            type: integer
        - name: classId
          in: query
          schema:
            type: integer
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Attendance summary
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttendanceSummary"

  # ─── RESULTS ─────────────────────────────────────────────────────────────────
  /schools/{schoolId}/results:
    get:
      operationId: listResults
      tags: [results]
      summary: List academic results
      parameters:
        - name: schoolId
          in: path
          required: true
          schema:
            type: integer
        - name: classId
          in: query
          schema:
            type: integer
        - name: subjectId
          in: query
          schema:
            type: integer
        - name: studentId
          in: query
          schema:
            type: integer
        - name: term
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Results list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Result"
    post:
      operationId: createResult
      tags: [results]
      summary: Enter a result
      parameters:
        - name: schoolId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResultInput"
      responses:
        "201":
          description: Result created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"

  /schools/{schoolId}/results/{resultId}:
    patch:
      operationId: updateResult
      tags: [results]
      summary: Update a result
      parameters:
        - name: schoolId
          in: path
          required: true
          schema:
            type: integer
        - name: resultId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResultUpdate"
      responses:
        "200":
          description: Updated result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"

  /schools/{schoolId}/results/report:
    get:
      operationId: getResultsReport
      tags: [results]
      summary: Generate results report for a class/term
      parameters:
        - name: schoolId
          in: path
          required: true
          schema:
            type: integer
        - name: classId
          in: query
          schema:
            type: integer
        - name: term
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Results report
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StudentResultReport"

  # ─── FEES ────────────────────────────────────────────────────────────────────
  /schools/{schoolId}/fees:
    get:
      operationId: listFees
      tags: [fees]
      summary: List fee records
      parameters:
        - name: schoolId
          in: path
          required: true
          schema:
            type: integer
        - name: studentId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [paid, pending, partial]
      responses:
        "200":
          description: Fee records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FeeRecord"
    post:
      operationId: createFeeRecord
      tags: [fees]
      summary: Record a fee payment
      parameters:
        - name: schoolId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeeInput"
      responses:
        "201":
          description: Fee record created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeeRecord"

  /schools/{schoolId}/fees/summary:
    get:
      operationId: getFeesSummary
      tags: [fees]
      summary: Fee collection summary
      parameters:
        - name: schoolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Fees summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeesSummary"

  # ─── ANNOUNCEMENTS ───────────────────────────────────────────────────────────
  /schools/{schoolId}/announcements:
    get:
      operationId: listAnnouncements
      tags: [announcements]
      summary: List announcements
      parameters:
        - name: schoolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Announcements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Announcement"
    post:
      operationId: createAnnouncement
      tags: [announcements]
      summary: Post an announcement
      parameters:
        - name: schoolId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnnouncementInput"
      responses:
        "201":
          description: Announcement created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"

  # ─── PARENT PORTAL ───────────────────────────────────────────────────────────
  /parent/children:
    get:
      operationId: getParentChildren
      tags: [parent]
      summary: Get parent's children
      responses:
        "200":
          description: Children list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StudentSummary"

  /parent/children/{studentId}/results:
    get:
      operationId: getChildResults
      tags: [parent]
      summary: Get child's academic results
      parameters:
        - name: studentId
          in: path
          required: true
          schema:
            type: integer
        - name: term
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Child results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Result"

  /parent/children/{studentId}/attendance:
    get:
      operationId: getChildAttendance
      tags: [parent]
      summary: Get child's attendance
      parameters:
        - name: studentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Child attendance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChildAttendanceSummary"

  /parent/children/{studentId}/fees:
    get:
      operationId: getChildFees
      tags: [parent]
      summary: Get child's fee records
      parameters:
        - name: studentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Child fees
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FeeRecord"

  /parent/notifications:
    get:
      operationId: getParentNotifications
      tags: [parent]
      summary: Get parent notifications
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  # ─── TEACHER PORTAL ──────────────────────────────────────────────────────────
  /teacher/dashboard:
    get:
      operationId: getTeacherDashboard
      tags: [teachers]
      summary: Teacher's dashboard - assigned classes and today's schedule
      responses:
        "200":
          description: Teacher dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeacherDashboard"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # ─── AUTH ──────────────────────────────────────────────────────────────────
    OtpRequest:
      type: object
      required: [phone]
      properties:
        phone:
          type: string
          description: Phone number with country code e.g. +233241234567

    OtpResponse:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
        message:
          type: string

    OtpVerify:
      type: object
      required: [phone, otp]
      properties:
        phone:
          type: string
        otp:
          type: string

    AuthSession:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string

    User:
      type: object
      required: [id, phone, role]
      properties:
        id:
          type: integer
        phone:
          type: string
        name:
          type: ["string", "null"]
        role:
          type: string
          enum: [super_admin, school_admin, teacher, parent]
        schoolId:
          type: ["integer", "null"]
        avatarUrl:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    # ─── SCHOOLS ───────────────────────────────────────────────────────────────
    School:
      type: object
      required: [id, name, location, status, plan, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        location:
          type: string
