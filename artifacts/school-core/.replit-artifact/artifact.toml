kind = "web"
previewPath = "/"
title = "SchoolCore"
version = "1.0.0"
id = "artifacts/school-core"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24847

[services.development]
run = "pnpm --filter @workspace/school-core run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/school-core", "run", "build" ]
serve = "static"
publicDir = "artifacts/school-core/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24847"
BASE_PATH = "/"
